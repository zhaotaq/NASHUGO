<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>标签: {{ .Title }} - {{ .Site.Title }}</title>
  <style>
    :root { --bg: #ffffff; --text: #333333; --text-muted: #999999; --link: #333333; --link-hover: #000000; --border: #eeeeee; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #121212; --text: #e0e0e0; --text-muted: #888888; --link: #82aaff; --link-hover: #a6c8ff; --border: #333333; }
    }
    body { background-color: var(--bg); color: var(--text); max-width: 800px; margin: 40px auto; padding: 0 20px; font-family: sans-serif; line-height: 1.8; overflow-wrap: break-word; transition: background-color 0.3s; }
    a { color: var(--link); text-decoration: none; border-bottom: 1px solid var(--border); }
    a:hover { color: var(--link-hover); border-bottom-color: var(--link-hover); }
    h1 { color: var(--text-muted); }
    h1 span { color: var(--text); }
    hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
    .meta-text { color: var(--text-muted); font-family: monospace; width: 120px; flex-shrink: 0; }
    @media (max-width: 600px) {
        li { flex-direction: column; align-items: flex-start !important; }
        .meta-text { margin-bottom: 5px; }
    }
  </style>
</head>
<body>
  <h1>包含标签 <span>#{{ .Title }}</span> 的文章</h1>
  <hr>
  <ul style="list-style: none; padding: 0;">
    {{ range .Pages }}
    <li style="margin-bottom: 20px; display: flex; align-items: baseline;">
        <time class="meta-text">{{ .Date.Format "2006-01-02" }}</time>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>
  <hr><a href="/tags/">← 查看所有标签</a> | <a href="/">返回首页</a>
</body>
</html>
