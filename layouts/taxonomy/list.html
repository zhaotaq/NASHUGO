{{ define "main" }}
<main>
    <h1 style="color: #666;">标签: <span style="color: #000;">{{ .Title }}</span></h1>
    <ul style="list-style: none; padding: 0;">
        {{ range .Pages }}
        <li style="margin-bottom: 15px; display: flex; align-items: baseline;">
            <time style="color: #888; font-family: monospace; margin-right: 20px; flex-shrink: 0;">
                {{ .Date.Format "2006-01-02" }}
            </time>
            <a href="{{ .Permalink }}" style="color: #333; text-decoration: none; border-bottom: 1px solid #eee;">
                {{ .Title }}
            </a>
        </li>
        {{ end }}
    </ul>
</main>
<style>
    @media (max-width: 600px) {
        ul li { flex-direction: column; }
        time { margin-bottom: 5px; }
    }
</style>
{{ end }}
