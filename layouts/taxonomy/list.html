<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>标签: {{ .Title }} - {{ .Site.Title }}</title>
  <style>
    body { overflow-wrap: break-word; }
    a { color: #333; text-decoration: none; border-bottom: 1px solid #eee; }
    a:hover { border-bottom-color: #333; }
    @media (max-width: 600px) {
        li { flex-direction: column; align-items: flex-start !important; }
        time { margin-bottom: 5px; }
    }
  </style>
</head>
<body style="max-width:800px;margin:40px auto;padding:0 20px;font-family:sans-serif;line-height:1.8;">
  <h1 style="color: #666;">包含标签 <span style="color: #000;">#{{ .Title }}</span> 的文章</h1>
  <hr>
  <ul style="list-style: none; padding: 0;">
    {{ range .Pages }}
    <li style="margin-bottom: 20px; display: flex; align-items: baseline;">
        <time style="color: #999; font-family: monospace; width: 120px; flex-shrink: 0;">{{ .Date.Format "2006-01-02" }}</time>
        <a href="{{ .Permalink }}">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>
  <hr><a href="/tags/">← 查看所有标签</a> | <a href="/">返回首页</a>
</body>
</html>
