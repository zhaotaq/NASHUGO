<!DOCTYPE html>
<html lang="zh" style="scrollbar-gutter: stable;">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>#{{ .Title }} - {{ .Site.Title }}</title>
  <style>
    :root { --bg: #fff; --text: #2c3e50; --link: #34495e; --border: #eee; --nav-link: #7f8c8d; }
    .dark-mode { --bg: #121212; --text: #dcdde1; --link: #82aaff; --border: #2f3640; --nav-link: #95a5a6; }
    body { background: var(--bg); color: var(--text); max-width: 780px; margin: 0 auto; padding: 0 25px 60px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.8; transition: background-color 0.3s; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; height: 32px; box-sizing: content-box; }
    nav { display: flex; align-items: center; gap: 28px; }
    nav a { color: var(--nav-link); text-decoration: none; font-size: 15px; font-weight: 500; border-bottom: 2px solid transparent; padding-bottom: 4px; transition: 0.2s; letter-spacing: 0.5px; }
    .nav-active { color: var(--text) !important; border-bottom-color: var(--text) !important; }
    .theme-toggle { cursor: pointer; font-size: 1.2rem; line-height: 1; user-select: none; }
    .tag-badge { background: var(--border); padding: 2px 12px; border-radius: 8px; color: var(--text); font-size: 1.8rem; }
    ul { list-style: none; padding: 0; margin-top: 40px; }
    li { margin-bottom: 18px; display: flex; align-items: baseline; }
    time { color: var(--nav-link); font-family: monospace; width: 110px; flex-shrink: 0; font-size: 14px; }
    a { color: var(--link); text-decoration: none; transition: 0.2s; }
    .post-link { font-size: 16px; }
    .back-link { display: inline-block; margin-top: 40px; font-size: 14px; color: var(--nav-link); text-decoration: none; border-bottom: 1px solid var(--border); }
    footer { margin-top: 80px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; color: var(--nav-link); font-size: 0.8rem; }
    @media (max-width: 500px) { nav { gap: 12px; } nav a { font-size: 14px; } h1 { font-size: 1.8rem; } }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="/" {{ if eq .RelPermalink "/" }}class="nav-active"{{ end }}>首页</a>
      <a href="/tags/" {{ if in .RelPermalink "/tags/" }}class="nav-active"{{ end }}>标签</a>
      <a href="/tools/" {{ if in .RelPermalink "/tools/" }}class="nav-active"{{ end }}>工具</a>
      <a href="/about/" {{ if in .RelPermalink "/about/" }}class="nav-active"{{ end }}>关于</a>
    </nav>
    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
  </header>
  <h1 style="display: flex; align-items: center; gap: 10px; font-size: 2.2rem; font-weight: 700; margin: 40px 0 20px;">相关档案：<span class="tag-badge">#{{ .Title }}</span></h1>
  <ul>
    {{ range .Pages }}
    <li><time>{{ .Date.Format "2006-01-02" }}</time><a class="post-link" href="{{ .RelPermalink }}">{{ .Title }}</a></li>
    {{ end }}
  </ul>
  <a href="/tags/" class="back-link">← 返回图谱</a>
  <footer><p>© <span id="year"></span> {{ .Site.Title }}</p></footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    function toggleTheme() { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode')?'dark':'light'); }
    
  </script>
</body>
</html>
