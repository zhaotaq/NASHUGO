{{ define "title" }}#{{ .Title }} - {{ .Site.Title }}{{ end }}

{{ define "extra_css" }}
<style>
  .tag-badge { background: var(--border); padding: 2px 12px; border-radius: 8px; color: var(--text); font-size: 1.8rem; }
  .back-link { display: inline-block; margin-top: 40px; font-size: 14px; color: var(--nav-link); text-decoration: none; border-bottom: 1px solid var(--border); }
</style>
{{ end }}

{{ define "main" }}
  <h1 style="display: flex; align-items: center; gap: 10px; font-size: 2.2rem; font-weight: 700; margin: 40px 0 20px;">相关档案：<span class="tag-badge">#{{ .Title }}</span></h1>
  <ul>
    {{ range .Pages }}
    <li><time>{{ .Date.Format "2006-01-02" }}</time><a class="post-link" href="{{ .RelPermalink }}">{{ .Title }}</a></li>
    {{ end }}
  </ul>
  <a href="{{ .Parent.RelPermalink }}" class="back-link">← 返回{{ .Parent.Title }}</a>
{{ end }}
