<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>所有标签 - {{ .Site.Title }}</title>
  <style>
    body { overflow-wrap: break-word; }
    a { color: #333; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body style="max-width:800px;margin:40px auto;padding:0 20px;font-family:sans-serif;line-height:1.8;">
  <h1 style="border-bottom: 2px solid #333; padding-bottom: 10px;">所有标签</h1>
  <ul style="list-style: none; padding: 0;">
    {{ range .Data.Terms.ByCount }}
    <li style="margin-bottom: 15px;">
        <a href="{{ .Page.RelPermalink }}" style="font-weight: bold; font-size: 1.1rem;">
            #{{ .Page.Title }}
        </a>
        <span style="color: #999; margin-left: 10px;">({{ .Count }} 篇文章)</span>
    </li>
    {{ end }}
  </ul>
  <hr><a href="/">← 返回首页</a>
</body>
</html>
