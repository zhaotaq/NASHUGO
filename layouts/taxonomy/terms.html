{{ define "main" }}
<main>
    <h1 style="border-bottom: 2px solid #333; padding-bottom: 10px;">所有标签</h1>
    <ul style="list-style: none; padding: 0;">
        {{ range .Data.Terms.ByCount }}
        <li style="margin-bottom: 10px;">
            <a href="{{ .Page.Permalink }}" style="color: #333; text-decoration: none; font-weight: bold;">
                {{ .Page.Title }}
            </a>
            <span style="color: #999; font-size: 0.8rem; margin-left: 8px;">({{ .Count }})</span>
        </li>
        {{ end }}
    </ul>
</main>
{{ end }}
