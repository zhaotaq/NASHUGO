<!DOCTYPE html>
<html lang="zh" style="scrollbar-gutter: stable;">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>标签与图谱 - {{ .Site.Title }}</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <style>
    :root { --bg: #fff; --text: #2c3e50; --link: #34495e; --border: #eee; --nav-link: #7f8c8d; }
    .dark-mode { --bg: #121212; --text: #dcdde1; --link: #82aaff; --border: #2f3640; --nav-link: #95a5a6; }
    body { background: var(--bg); color: var(--text); max-width: 780px; margin: 0 auto; padding: 0 25px 60px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.8; transition: background-color 0.3s; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; height: 32px; }
    nav a { margin-right: 25px; color: var(--nav-link); text-decoration: none; font-size: 0.95rem; border-bottom: 2px solid transparent; padding-bottom: 4px; transition: 0.2s; }
    .nav-active { color: var(--text) !important; border-bottom-color: var(--text) !important; font-weight: 500; }
    .theme-toggle { cursor: pointer; font-size: 1.2rem; line-height: 1; }
    h1 { font-size: 2.2rem; margin: 40px 0 10px; font-weight: 700; }
    
    #graph-container { width: 100%; height: 450px; margin-top: 30px; border-radius: 8px; border: 1px solid var(--border); background: transparent; }
    
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 40px; list-style: none; padding: 0; }
    .tag-cloud a { color: var(--text); text-decoration: none; background: var(--border); padding: 6px 14px; border-radius: 20px; font-size: 0.9rem; transition: 0.2s; }
    .tag-cloud a:hover { opacity: 0.8; }
    .tag-count { opacity: 0.5; font-size: 0.8em; margin-left: 4px; }
    
    footer { margin-top: 80px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; color: var(--nav-link); font-size: 0.8rem; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/">首页</a>
      <a href="/archive/">归档</a>
      <a href="/tags/" class="nav-active">标签</a>
      <a href="/tools/">工具</a>
      <a href="/about/">关于</a>
    </nav>
    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
  </header>

  <h1>标签与图谱</h1>
  <p style="color: var(--nav-link); font-size: 0.9em;">知识的漫游轨迹。节点越大，代表相关文章越多；连线代表它们曾被同时提及。</p>
  
  <div id="graph-container"></div>

  <ul class="tag-cloud">
    {{ range .Data.Terms.ByCount }}
    <li><a href="{{ .Page.RelPermalink }}">#{{ .Page.Title }} <span class="tag-count">{{ .Count }}</span></a></li>
    {{ end }}
  </ul>

  <footer><p>© <span id="year"></span> {{ .Site.Title }}</p></footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    
    function toggleTheme() { 
      document.body.classList.toggle('dark-mode'); 
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); 
      initGraph(); // 切换主题时刷新图表颜色
    }
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

    let graphNodes = [];
    let graphLinks = [];

    {{ range $name, $taxonomy := .Site.Taxonomies.tags }}
      graphNodes.push({
        id: "{{ $name | lower }}",
        name: "{{ $name }}",
        symbolSize: {{ add 15 (mul $taxonomy.Count 3) }},
        url: "/tags/{{ $name | urlize }}/"
      });
    {{ end }}

    {{ range .Site.RegularPages }}
      {{ $pageTags := .Params.tags }}
      {{ if $pageTags }}
        var currentTags = {{ $pageTags | jsonify }};
        if(currentTags && currentTags.length > 1) {
          for(let i=0; i<currentTags.length; i++) {
            for(let j=i+1; j<currentTags.length; j++) {
              graphLinks.push({ source: currentTags[i].toLowerCase(), target: currentTags[j].toLowerCase() });
            }
          }
        }
      {{ end }}
    {{ end }}

    let myChart = null;
    function initGraph() {
      if (myChart != null) myChart.dispose();
      let dom = document.getElementById('graph-container');
      if (!dom || graphNodes.length === 0) {
          if(dom) dom.style.display = 'none';
          return;
      }
      myChart = echarts.init(dom);
      
      let isDark = document.body.classList.contains('dark-mode');
      let textColor = isDark ? '#dcdde1' : '#2c3e50';
      let lineColor = isDark ? 'rgba(130, 170, 255, 0.2)' : 'rgba(52, 73, 94, 0.15)';
      let nodeColor = isDark ? '#82aaff' : '#3498db';

      let option = {
        tooltip: { formatter: '{b}' },
        series: [{
          type: 'graph',
          layout: 'force',
          data: graphNodes,
          links: graphLinks,
          roam: true,
          label: { show: true, position: 'right', color: textColor, fontSize: 12 },
          force: { repulsion: 250, edgeLength: 80 },
          itemStyle: { color: nodeColor, borderColor: isDark ? '#121212' : '#fff', borderWidth: 2 },
          lineStyle: { color: lineColor, curveness: 0.1, width: 2 }
        }]
      };
      myChart.setOption(option);
      
      myChart.on('click', function (params) {
        if (params.dataType === 'node' && params.data.url) window.location.href = params.data.url;
      });
    }

    setTimeout(initGraph, 100);
    window.addEventListener('resize', function() { if(myChart) myChart.resize(); });
  </script>
</body>
</html>
