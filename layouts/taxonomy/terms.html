<!DOCTYPE html>
<html lang="zh" style="scrollbar-gutter: stable;">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>标签与图谱 - {{ .Site.Title }}</title>
  <script src="https://unpkg.com/force-graph"></script>
  <style>
    :root { --bg: #fff; --text: #2c3e50; --link: #34495e; --border: #eee; --nav-link: #7f8c8d; }
    .dark-mode { --bg: #121212; --text: #dcdde1; --link: #82aaff; --border: #2f3640; --nav-link: #95a5a6; }
    body { background: var(--bg); color: var(--text); max-width: 780px; margin: 0 auto; padding: 0 25px 60px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.8; transition: background-color 0.3s; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; height: 32px; box-sizing: content-box; }
    nav { display: flex; align-items: center; gap: 2px; }
    nav a { color: var(--nav-link); text-decoration: none; font-size: 14px; font-weight: 400; padding: 5px 12px; border-radius: 20px; transition: background 0.15s, color 0.15s; -webkit-font-smoothing: antialiased; }
    nav a:hover { background: var(--border); color: var(--text); }
    .nav-active { background: var(--text) !important; color: var(--bg) !important; }
    .theme-toggle { cursor: pointer; font-size: 1.1rem; user-select: none; padding: 5px 8px; border-radius: 20px; transition: background 0.15s; }
    .theme-toggle:hover { background: var(--border); }
    h1 { font-size: 2.2rem; margin: 40px 0 10px; font-weight: 700; }
    #graph-container { width: 100%; height: 60vh; min-height: 400px; max-height: 550px; margin-top: 30px; border-radius: 12px; background: var(--bg); border: 1px solid var(--border); box-shadow: inset 0 0 30px rgba(0,0,0,0.03); overflow: hidden; }
    .tag-cloud { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 40px; list-style: none; padding: 0; }
    .tag-cloud a { color: var(--text); text-decoration: none; background: var(--border); padding: 6px 14px; border-radius: 20px; font-size: 0.9rem; transition: 0.2s; }
    footer { margin-top: 80px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; color: var(--nav-link); font-size: 0.8rem; }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="/" {{ if eq .RelPermalink "/" }}class="nav-active"{{ end }}>首页</a>
      <a href="/tags/" {{ if in .RelPermalink "/tags/" }}class="nav-active"{{ end }}>标签</a>
      <a href="/tools/" {{ if in .RelPermalink "/tools/" }}class="nav-active"{{ end }}>工具</a>
      <a href="/about/" {{ if in .RelPermalink "/about/" }}class="nav-active"{{ end }}>关于</a>
    </nav>
    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
  </header>

  <h1>标签与图谱</h1>
  <p style="color: var(--nav-link); font-size: 0.9em;">知识的大脑漫游。深色大圆点为核心领域，彩色小圆点为生长分支，灰色为独立节点。</p>
  
  <div id="graph-container"></div>

  <ul class="tag-cloud">
    {{ range .Data.Terms.ByCount }}
    <li><a href="{{ .Page.RelPermalink }}">#{{ .Page.Title }} <span style="opacity:0.5; font-size:0.8em;">{{ .Count }}</span></a></li>
    {{ end }}
  </ul>

  <footer><p>© <span id="year"></span> {{ .Site.Title }}</p></footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    let myGraph = null;

    function toggleTheme() { 
      document.body.classList.toggle('dark-mode'); 
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); 
      if (myGraph) myGraph.refresh(); 
    }
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

    const graphData = { nodes: [], links: [] };
    const nodesMap = {};
    let maxVal = 1;

    {{ range .Data.Terms.ByCount }}
      (function() {
        // 【核心修复】：去掉 jsonify，直接使用纯净的字符串变量传递
        const id = "{{ .Page.Title | urlize }}";
        const name = "{{ .Page.Title }}";
        const val = {{ .Count }};
        if (val > maxVal) maxVal = val;
        const node = { id: id, name: name, val: val, isConnected: false, url: "{{ .Page.RelPermalink }}" };
        graphData.nodes.push(node);
        nodesMap[id] = node;
      })();
    {{ end }}

    {{ range .Site.RegularPages }}
      {{ with .Params.tags }}
        {{ if gt (len .) 1 }}
          (function() {
            const tags = [{{ range . }}"{{ . | urlize }}",{{ end }}];
            for (let i = 0; i < tags.length; i++) {
              for (let j = i + 1; j < tags.length; j++) {
                const s = tags[i], t = tags[j];
                if (nodesMap[s] && nodesMap[t]) {
                  graphData.links.push({ source: s, target: t });
                  nodesMap[s].isConnected = true;
                  nodesMap[t].isConnected = true;
                }
              }
            }
          })();
        {{ end }}
      {{ end }}
    {{ end }}

    function getNodeColor(node, isDark) {
      if (!node.isConnected) return isDark ? '#4a5940' : '#bdc3c7'; 
      const activity = Math.min(1, Math.log2(node.val + 1) / Math.log2(maxVal + 2));
      if (isDark) { return activity > 0.6 ? '#9a73ff' : '#00d2d3'; } 
      else { return activity > 0.6 ? '#6b3fa0' : '#3498db'; }
    }

    function init() {
      const container = document.getElementById('graph-container');
      if (!container || graphData.nodes.length === 0) return;

      myGraph = ForceGraph()(container)
        .graphData(graphData)
        .nodeId('id')
        .nodeVal('val')
        .nodeLabel('') 
        .backgroundColor('rgba(0,0,0,0)')
        .nodeCanvasObject((node, ctx, globalScale) => {
          const isDark = document.body.classList.contains('dark-mode');
          const r = Math.sqrt(node.val) * 4 + 2;
          ctx.beginPath();
          ctx.arc(node.x, node.y, r, 0, 2 * Math.PI, false);
          ctx.fillStyle = getNodeColor(node, isDark);
          ctx.fill();

          const label = node.name || '';
          const fontSize = Math.max(12 / globalScale, 5);
          ctx.font = `${fontSize}px Sans-Serif`;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'top';
          ctx.fillStyle = isDark ? 'rgba(220, 221, 225, 0.7)' : 'rgba(44, 62, 80, 0.7)';
          ctx.fillText(label, node.x, node.y + r + 2);
        })
        .linkColor(() => document.body.classList.contains('dark-mode') ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)')
        .linkWidth(1)
        .onNodeClick(node => { if(node.url) window.location.href = node.url; })
        .onNodeHover(node => container.style.cursor = node ? 'pointer' : 'grab');

      myGraph.d3Force('charge').strength(-80); 
      myGraph.d3Force('link').distance(60);

      myGraph.onEngineStop(() => { myGraph.zoomToFit(600, 50); });

      const ro = new ResizeObserver(() => {
        myGraph.width(container.clientWidth);
        myGraph.height(container.clientHeight);
        setTimeout(() => { if(myGraph) myGraph.zoomToFit(200, 50); }, 200);
      });
      ro.observe(container);
    }

    setTimeout(init, 100);
  </script>
</body>
</html>
