<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>所有标签 - {{ .Site.Title }}</title>
  <style>
    :root { --bg: #ffffff; --text: #333333; --text-muted: #999999; --link: #333333; --link-hover: #000000; --border: #333333; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #121212; --text: #e0e0e0; --text-muted: #888888; --link: #82aaff; --link-hover: #a6c8ff; --border: #555555; }
    }
    body { background-color: var(--bg); color: var(--text); max-width: 800px; margin: 40px auto; padding: 0 20px; font-family: sans-serif; line-height: 1.8; overflow-wrap: break-word; transition: background-color 0.3s; }
    a { color: var(--link); text-decoration: none; }
    a:hover { color: var(--link-hover); text-decoration: underline; }
    h1 { border-bottom: 2px solid var(--border); padding-bottom: 10px; }
    .meta-text { color: var(--text-muted); margin-left: 10px; font-size: 0.9em; }
    hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  </style>
</head>
<body>
  <h1>所有标签</h1>
  <ul style="list-style: none; padding: 0;">
    {{ range .Data.Terms.ByCount }}
    <li style="margin-bottom: 15px;">
        <a href="{{ .Page.RelPermalink }}" style="font-weight: bold; font-size: 1.1rem;">
            #{{ .Page.Title }}
        </a>
        <span class="meta-text">({{ .Count }} 篇文章)</span>
    </li>
    {{ end }}
  </ul>
  <hr><a href="/">← 返回首页</a>
</body>
</html>
