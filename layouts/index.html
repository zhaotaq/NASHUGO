<!DOCTYPE html>
<html lang="zh" style="scrollbar-gutter: stable;">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Site.Title }}</title>
  <style>
    :root { --bg: #fff; --text: #2c3e50; --link: #34495e; --border: #eee; --nav-link: #7f8c8d; }
    .dark-mode { --bg: #121212; --text: #dcdde1; --link: #82aaff; --border: #2f3640; --nav-link: #95a5a6; }
    body { background: var(--bg); color: var(--text); max-width: 780px; margin: 0 auto; padding: 0 25px 60px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.8; transition: background-color 0.3s; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
    nav a { margin-right: 25px; color: var(--nav-link); text-decoration: none; font-size: 0.95rem; }
    .nav-active { color: var(--text); font-weight: bold; }
    .theme-toggle { cursor: pointer; font-size: 1.2rem; }
    h1 { font-size: 2.2rem; margin: 40px 0 10px; text-align: left; }
    ul { list-style: none; padding: 0; margin-top: 30px; }
    li { margin-bottom: 18px; display: flex; align-items: baseline; }
    time { color: var(--nav-link); font-family: monospace; width: 110px; flex-shrink: 0; }
    a { color: var(--link); text-decoration: none; border-bottom: 1px solid transparent; transition: 0.2s; }
    li a:hover { border-bottom-color: var(--link); }
    footer { margin-top: 80px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; color: var(--nav-link); font-size: 0.8rem; }
  </style>
</head>
<body>
  <header>
    <nav><a href="/" class="nav-active">首页</a><a href="/archive/">归档</a><a href="/tags/">标签</a><a href="/about/">关于</a></nav>
    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
  </header>
  <h1>{{ .Site.Title }}</h1>
  <p style="color: var(--nav-link); margin-bottom: 50px;">{{ .Site.Params.description | default "个人数字花园" }}</p>
  <ul>
    {{ range .Site.RegularPages }}
    <li><time>{{ .Date.Format "2006-01-02" }}</time><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
    {{ end }}
  </ul>
  <footer><p>© <span id="year"></span> {{ .Site.Title }} · Powered by NAS</p></footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    function toggleTheme() { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode')?'dark':'light'); }
    if (localStorage.getItem('theme')==='dark') document.body.classList.add('dark-mode');
  </script>
</body>
</html>
