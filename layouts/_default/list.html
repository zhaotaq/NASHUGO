{{ define "main" }}
  <h1>{{ .Title }}</h1>
  <ul>
    {{ range .Pages.ByDate.Reverse }}
      <li>
        <time>{{ .Date.Format "2006-01-02" }}</time>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        {{ with .Params.energy }}
        <div class="energy-bar-mini" title="精力值: {{ . }}/5"><div class="energy-fill-mini" style="width: {{ mul . 20 }}%;"></div></div>
        {{ end }}
        <div class="post-meta-icons">
          {{ with .Params.people }}<span class="meta-icon-item" title="关联人物: {{ delimit . ", " }}">👤 {{ len . }}</span>{{ end }}
          {{ with .Params.health }}<span class="meta-icon-item" title="健康状态: {{ delimit . ", " }}">🩺 {{ len . }}</span>{{ end }}
        </div>
      </li>
    {{ end }}
  </ul>
{{ end }}
