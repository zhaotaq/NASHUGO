<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <style>
    :root { --bg: #fff; --text: #333; --link: #333; --border: #eee; --nav-link: #666; --code-bg: #f6f8fa; --toc-bg: #fafafa; }
    .dark-mode { --bg: #121212; --text: #e0e0e0; --link: #82aaff; --border: #333; --nav-link: #aaa; --code-bg: #1e1e1e; --toc-bg: #1a1a1a; }
    
    body { background: var(--bg); color: var(--text); max-width: 800px; margin: 0 auto; padding: 0 20px 40px; font-family: sans-serif; line-height: 1.8; transition: 0.3s; position: relative; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
    nav a { margin-right: 20px; color: var(--nav-link); text-decoration: none; font-size: 0.95rem; }
    .theme-toggle { cursor: pointer; font-size: 1.2rem; }
    a { color: var(--link); text-decoration: none; }
    
    /* 文章目录 (TOC) 样式 */
    #toc { 
      background: var(--toc-bg); 
      padding: 15px; 
      border-radius: 8px; 
      margin-bottom: 30px; 
      font-size: 0.9rem;
      border: 1px solid var(--border);
    }
    #toc nav ul { list-style: none; padding-left: 15px; margin: 5px 0; }
    #toc nav > ul { padding-left: 0; }
    #toc a { border: none; color: var(--nav-link); }
    #toc a:hover { color: var(--link); text-decoration: underline; }
    .toc-title { font-weight: bold; margin-bottom: 10px; display: block; border-bottom: 1px solid var(--border); }

    /* 宽屏下的悬浮效果 */
    @media (min-width: 1200px) {
      #toc {
        position: fixed;
        left: calc(50% + 420px); /* 居中线右侧 */
        top: 100px;
        width: 250px;
        max-height: 70vh;
        overflow-y: auto;
      }
    }

    .tag-link { background: var(--border); padding: 2px 6px; border-radius: 3px; font-size: 0.85em; margin-right: 5px; color: var(--nav-link); }
    pre { background: var(--code-bg); padding: 15px; overflow-x: auto; border-radius: 4px; border: 1px solid var(--border); }
    hr { border: none; border-top: 1px solid var(--border); margin: 30px 0; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/">首页</a>
      <a href="/archive/">归档</a>
      <a href="/tags/">标签</a>
      <a href="/about/">关于</a>
    </nav>
    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
  </header>
  
  <article>
    <h1>{{ .Title }}</h1>
    <p style="color:#999; font-size: 0.9em;">刊于 {{ .Date.Format "2006-01-02" }}</p>
    {{ with .Params.tags }}
      <p style="font-size: 0.9em;">{{ range . }}<a href="/tags/{{ . | urlize }}/" class="tag-link">#{{ . }}</a>{{ end }}</p>
    {{ end }}
    <hr>

    {{ if .TableOfContents }}
    <aside id="toc">
      <span class="toc-title">目录提纲</span>
      {{ .TableOfContents }}
    </aside>
    {{ end }}

    <div class="content">{{ .Content }}</div>
  </article>

  <hr>
  <div style="text-align: center;"><a href="/">← 返回首页</a></div>

  <script>
    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
  </script>
</body>
</html>
