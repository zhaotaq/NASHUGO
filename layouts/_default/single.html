<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <style>
    img { max-width: 100%; height: auto; display: block; margin: 20px 0; border-radius: 8px; }
    body { overflow-wrap: break-word; }
    .tag-link { background: #f0f0f0; padding: 2px 6px; margin-right: 5px; border-radius: 3px; color: #333; text-decoration: none; }
    .tag-link:hover { background: #e0e0e0; }
  </style>
</head>
<body style="max-width:800px;margin:40px auto;padding:0 20px;font-family:sans-serif;line-height:1.8;">
  <h1>{{ .Title }}</h1>
  <p style="color:#999;">刊于 {{ .Date.Format "2006-01-02" }}</p>
  {{ with .Params.tags }}
    <p style="font-size: 0.9em; color: #666;">
      标签：
      {{ range . }}
        <a href="{{ "/tags/" | relLangURL }}{{ . | urlize }}/" class="tag-link">#{{ . }}</a>
      {{ end }}
    </p>
  {{ end }}
  <hr>
  <div>{{ .Content }}</div>
  <hr><a href="/">← 返回首页</a>
</body>
</html>
