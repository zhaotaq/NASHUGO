<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <style>
    :root { --bg: #fff; --text: #333; --link: #333; --border: #eee; --tag-bg: #f0f0f0; --code-bg: #f6f8fa; }
    .dark-mode { --bg: #121212; --text: #e0e0e0; --link: #82aaff; --border: #333; --tag-bg: #222; --code-bg: #1e1e1e; }
    body { background: var(--bg); color: var(--text); max-width: 800px; margin: 40px auto; padding: 0 20px; font-family: sans-serif; line-height: 1.8; transition: 0.3s; }
    .nav-btn { position: fixed; top: 20px; right: 20px; cursor: pointer; font-size: 1.5rem; }
    img { max-width: 100%; border-radius: 8px; }
    a { color: var(--link); text-decoration: none; }
    .tag-link { background: var(--tag-bg); padding: 2px 6px; border-radius: 3px; font-size: 0.9em; margin-right: 5px; }
    pre { background: var(--code-bg); padding: 15px; overflow-x: auto; border-radius: 4px; }
    hr { border: none; border-top: 1px solid var(--border); margin: 30px 0; }
  </style>
</head>
<body>
  <div class="nav-btn" onclick="toggleTheme()">🌓</div>
  <h1>{{ .Title }}</h1>
  <p style="color:#999;">{{ .Date.Format "2006-01-02" }}</p>
  {{ with .Params.tags }}
    <p>标签：{{ range . }}<a href="/tags/{{ . | urlize }}/" class="tag-link">#{{ . }}</a>{{ end }}</p>
  {{ end }}
  <hr>
  <div>{{ .Content }}</div>
  <hr><a href="/">← 返回首页</a>

  <script>
    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
  </script>
</body>
</html>
