<!DOCTYPE html>
<html lang="zh" style="scrollbar-gutter: stable; scroll-behavior: smooth;">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <style>
    :root { --bg: #fff; --text: #2c3e50; --link: #34495e; --border: #eee; --nav-link: #7f8c8d; --code-bg: #f8f9fa; --toc-bg: #fafafa; --progress: #3498db; }
    .dark-mode { --bg: #121212; --text: #dcdde1; --link: #82aaff; --border: #2f3640; --nav-link: #95a5a6; --code-bg: #1e1e1e; --toc-bg: #1a1a1a; --progress: #82aaff; }
    #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--progress); width: 0%; z-index: 100; }
    body { background: var(--bg); color: var(--text); max-width: 780px; margin: 0 auto; padding: 0 25px 60px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.85; transition: background-color 0.3s; position: relative; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
    nav a { margin-right: 25px; color: var(--nav-link); text-decoration: none; font-size: 0.95rem; }
    .theme-toggle { cursor: pointer; font-size: 1.2rem; }
    h1 { font-size: 2.2rem; margin-bottom: 10px; text-align: left; }
    .tag-link { background: var(--border); padding: 2px 8px; border-radius: 4px; font-size: 0.85em; margin-right: 8px; color: var(--nav-link); text-decoration: none; }
    #toc { background: var(--toc-bg); padding: 15px; border-radius: 8px; margin-bottom: 30px; font-size: 0.9rem; border: 1px solid var(--border); }
    @media (min-width: 1250px) { #toc { position: fixed; left: calc(50% + 420px); top: 100px; width: 240px; border: none; background: transparent; } }
    footer { margin-top: 80px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; color: var(--nav-link); font-size: 0.8rem; }
    pre { background: var(--code-bg); padding: 15px; overflow-x: auto; border-radius: 4px; border: 1px solid var(--border); }
    blockquote { border-left: 4px solid var(--border); margin: 2rem 0; padding: 0.5rem 1.5rem; color: var(--nav-link); background: var(--toc-bg); }
  </style>
</head>
<body>
  <div id="progress-bar"></div>
  <header>
    <nav><a href="/">首页</a><a href="/archive/">归档</a><a href="/tags/">标签</a><a href="/about/">关于</a></nav>
    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
  </header>
  <article>
    <h1>{{ .Title }}</h1>
    <p style="color:var(--nav-link); font-size: 0.9em; margin-bottom: 25px;">{{ if ne .Type "page" }}刊于 {{ .Date.Format "2006-01-02" }}{{ end }}</p>
    {{ with .Params.tags }}<p>{{ range . }}<a href="/tags/{{ . | urlize }}/" class="tag-link">#{{ . }}</a>{{ end }}</p>{{ end }}
    <hr style="border:none; border-top:1px solid var(--border); margin: 30px 0;">
    {{ if .TableOfContents }}<aside id="toc"><span style="font-weight:bold; display:block; margin-bottom:10px;">目录提纲</span>{{ .TableOfContents }}</aside>{{ end }}
    <div class="content">{{ .Content }}</div>
  </article>
  <footer><p>© <span id="year"></span> {{ .Site.Title }}</p></footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    function toggleTheme() { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode')?'dark':'light'); }
    if (localStorage.getItem('theme')==='dark') document.body.classList.add('dark-mode');
    window.onscroll = function() {
      var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
      var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      var scrolled = (winScroll / height) * 100;
      document.getElementById("progress-bar").style.width = scrolled + "%";
    };
  </script>
</body>
</html>
