<!DOCTYPE html>
<html style="scroll-behavior: smooth;">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <style>
    :root { 
      --bg: #fff; --text: #2c3e50; --link: #34495e; --border: #eee; 
      --nav-link: #7f8c8d; --code-bg: #f8f9fa; --toc-bg: #fafafa; --progress: #3498db; 
    }
    .dark-mode { 
      --bg: #121212; --text: #dcdde1; --link: #82aaff; --border: #2f3640; 
      --nav-link: #95a5a6; --code-bg: #1e1e1e; --toc-bg: #1a1a1a; --progress: #82aaff; 
    }
    
    /* 进度条样式 */
    #progress-bar { position: fixed; top: 0; left: 0; height: 3px; background: var(--progress); width: 0%; z-index: 100; transition: width 0.1s; }

    body { 
      background: var(--bg); color: var(--text); max-width: 780px; margin: 0 auto; padding: 0 20px 60px; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.85; transition: 0.3s; position: relative; -webkit-font-smoothing: antialiased;
    }
    header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
    nav a { margin-right: 20px; color: var(--nav-link); text-decoration: none; font-size: 0.95rem; }
    .theme-toggle { cursor: pointer; font-size: 1.2rem; }
    
    /* 文章排版微调 */
    h1, h2, h3 { color: var(--text); line-height: 1.3; }
    .content p { margin-bottom: 1.5rem; }
    .content img { max-width: 100%; border-radius: 8px; margin: 2rem 0; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    blockquote { border-left: 4px solid var(--border); margin: 2rem 0; padding: 0.5rem 1.5rem; color: var(--nav-link); background: var(--toc-bg); font-style: italic; }
    
    #toc { background: var(--toc-bg); padding: 15px; border-radius: 8px; margin-bottom: 30px; font-size: 0.9rem; border: 1px solid var(--border); }
    @media (min-width: 1250px) { #toc { position: fixed; left: calc(50% + 420px); top: 100px; width: 240px; max-height: 70vh; overflow-y: auto; border: none; background: transparent; } }

    footer { margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; color: var(--nav-link); font-size: 0.85rem; }
  </style>
</head>
<body>
  <div id="progress-bar"></div>
  <header>
    <nav><a href="/">首页</a><a href="/archive/">归档</a><a href="/tags/">标签</a><a href="/about/">关于</a></nav>
    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
  </header>
  
  <article>
    <h1 style="font-size: 2.2rem; margin-bottom: 0.5rem;">{{ .Title }}</h1>
    <p style="color:var(--nav-link); font-size: 0.9em; margin-bottom: 2rem;">刊于 {{ .Date.Format "2006-01-02" }} · {{ .WordCount }} 字</p>
    
    {{ if .TableOfContents }}<aside id="toc"><span style="font-weight:bold; display:block; margin-bottom:10px;">目录提纲</span>{{ .TableOfContents }}</aside>{{ end }}

    <div class="content">{{ .Content }}</div>
  </article>

  <footer>
    <p>© <span id="year"></span> {{ .Site.Title }} · 个人数字花园</p>
    <p style="font-size: 0.75rem; opacity: 0.6;">Powered by Hugo & NAS</p>
  </footer>

  <script>
    // 自动更新年份
    document.getElementById('year').textContent = new Date().getFullYear();
    // 深色模式逻辑
    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }
    if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');
    
    // 阅读进度条逻辑
    window.onscroll = function() {
      var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
      var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      var scrolled = (winScroll / height) * 100;
      document.getElementById("progress-bar").style.width = scrolled + "%";
    };
  </script>
</body>
</html>
