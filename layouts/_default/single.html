{{ define "main" }}
<article>
    <h1>{{ .Title }}</h1>
    <time>{{ .Date.Format "2006-01-02" }}</time>
    <div class="post-content">
        {{ .Content }}
    </div>
    
    {{ if .Params.tags }}
    <div class="post-tags" style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px;">
        {{ range .Params.tags }}
        <a href="{{ "/tags/" | relLangURL }}{{ . | urlize }}/" style="color: #666; text-decoration: none; margin-right: 12px; font-size: 0.9rem;">
            #{{ . }}
        </a>
        {{ end }}
    </div>
    {{ end }}
</article>
{{ end }}
