<!DOCTYPE html>
<html lang="zh" style="scrollbar-gutter: stable; scroll-behavior: smooth;">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ .Title }} - {{ .Site.Title }}</title>
  <style>
    :root { --bg: #fff; --text: #2c3e50; --link: #34495e; --border: #eee; --nav-link: #7f8c8d; --code-bg: #f8f9fa; --toc-bg: #fafafa; }
    .dark-mode { --bg: #121212; --text: #dcdde1; --link: #82aaff; --border: #2f3640; --nav-link: #95a5a6; --code-bg: #1e1e1e; --toc-bg: #1a1a1a; }
    body { background: var(--bg); color: var(--text); max-width: 780px; margin: 0 auto; padding: 0 25px 60px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.8; transition: background-color 0.3s; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 30px 0; border-bottom: 1px solid var(--border); margin-bottom: 40px; height: 32px; }
    nav a { margin-right: 25px; color: var(--nav-link); text-decoration: none; font-size: 0.95rem; border-bottom: 2px solid transparent; padding-bottom: 4px; transition: 0.2s; }
    .nav-active { color: var(--text) !important; border-bottom-color: var(--text) !important; font-weight: 500; }
    .theme-toggle { cursor: pointer; font-size: 1.2rem; line-height: 1; }
    h1 { font-size: 2.2rem; margin: 40px 0 20px; text-align: left; font-weight: 700; }
    #toc { background: var(--toc-bg); padding: 15px; border-radius: 8px; margin-bottom: 30px; font-size: 0.9rem; border: 1px solid var(--border); }
    @media (min-width: 1250px) { #toc { position: fixed; left: calc(50% + 420px); top: 100px; width: 240px; border: none; background: transparent; } }
    footer { margin-top: 80px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; color: var(--nav-link); font-size: 0.8rem; }
    .tag-link { background: var(--border); padding: 2px 8px; border-radius: 4px; font-size: 0.85em; margin-right: 8px; color: var(--nav-link); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="/">首页</a>
      <a href="/archive/">归档</a>
      <a href="/tags/">标签</a>
      <a href="/about/" class="nav-active">关于</a>
    </nav>
    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
  </header>
  <article>
    <h1>{{ .Title }}</h1>
    {{ if eq .Section "posts" }}
      <p style="color:var(--nav-link); font-size: 0.9em; margin-bottom: 20px;">刊于 {{ .Date.Format "2006-01-02" }}</p>
      {{ with .Params.tags }}<p style="margin-bottom: 30px;">{{ range . }}<a href="/tags/{{ . | urlize }}/" class="tag-link">#{{ . }}</a>{{ end }}</p>{{ end }}
      {{ if .TableOfContents }}<aside id="toc"><span style="font-weight:bold; display:block; margin-bottom:10px;">目录提纲</span>{{ .TableOfContents }}</aside>{{ end }}
    {{ end }}
    <div class="content">{{ .Content }}</div>
  </article>
  <footer><p>© <span id="year"></span> {{ .Site.Title }}</p></footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    function toggleTheme() { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode')?'dark':'light'); }
    if (localStorage.getItem('theme')==='dark') document.body.classList.add('dark-mode');
  </script>
</body>
</html>
